<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .card-img-top {
        transform: scale(1) translateY(0);
        transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .card-img-top:hover {
        transform: scale(1.08) translateY(-3px);
        transition: transform 100ms ease-in;
      }
      .card {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="pb-5">
      <div class="container mt-5">
        <h1 class="display-1">Admin Portal</h1>
        <div class="row row-cols-1 row-cols-md-3 g-4" style="margin: 3rem 0">
          <div class="col">
            <div class="card h-100 w-75">
              <a th:href="@{/admin/products}">
                <img
                  th:src="@{/images/items.png}"
                  class="card-img-top"
                  alt="Products"
                />
              </a>
              <div class="card-body">
                <h3 class="card-title">Products</h3>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card h-100 w-75">
              <a th:href="@{/admin/manufacturers}">
                <img
                  th:src="@{/images/manufacturer.png}"
                  class="card-img-top"
                  alt="Manufacturers"
                />
              </a>
              <div class="card-body">
                <h3 class="card-title">Manufacturers</h3>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card h-100 w-75">
              <a th:href="@{/admin/suppliers}">
                <img
                  th:src="@{/images/supplier.png}"
                  class="card-img-top"
                  alt="Suppliers"
                />
              </a>
              <div class="card-body">
                <h3 class="card-title">Suppliers</h3>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card h-100 w-75">
              <a th:href="@{/admin/users}">
                <img
                  th:src="@{/images/users.png}"
                  class="card-img-top"
                  alt="Users"
                />
              </a>
              <div class="card-body">
                <h3 class="card-title">Users</h3>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card h-100 w-75">
              <a th:href="@{/admin/settings}">
                <img
                  th:src="@{/images/settings.png}"
                  class="card-img-top"
                  alt="Settings"
                />
              </a>
              <div class="card-body">
                <h3 class="card-title">Settings</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
