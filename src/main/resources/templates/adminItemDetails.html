<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Admin - Products - <span th:text="${item.name}">Product</span></title>
  </head>
  <body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="container mt-5" style="min-height: calc(100vh - 158px);">
      <div class="mt-3">
        <div
          th:if="${successMessage}"
          class="alert alert-success"
          th:text="${successMessage}"
        ></div>
        <div
          th:if="${errorMessage}"
          class="alert alert-danger"
          th:text="${errorMessage}"
        ></div>
      </div>
      <div
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 2rem;
        "
      >
        <div>
          <a
            th:if="${previousItem != null}"
            th:href="@{/admin/products/{id}(id=${previousItem})}"
            >Previous</a
          >
        </div>
        <div>
          <a
            th:if="${nextItem != null}"
            th:href="@{/admin/products/{id}(id=${nextItem})}"
            >Next</a
          >
        </div>
      </div>
      <h1 th:text="${item.name}">Product</h1>
      <div class="row row-cols-1 row-cols-md-2 g-4" style="margin-top: 3rem">
        <div class="card h-100" style="max-width: 400px">
          <img
            th:if="${item.image != null}"
            th:src="@{/admin/products/{id}/image(id=${item.image.id})}"
            class="card-img-top"
            alt="Product image"
          />
          <img
            th:unless="${item.image != null}"
            th:src="@{/images/No_Image_Available.png}"
            class="card-img-top"
            alt="No product image"
          />
        </div>
        <div class="col">
          <div class="card-body">
            <p class="card-text">
              <strong th:text="${item.price} + ' €'">Price</strong>
            </p>
            <p class="card-text" th:text="${item.description}">Description</p>
            <p>
              <strong class="card-text" th:text="${item.manufacturer.name}"
                >Manufacturer</strong
              >
            </p>
            <p class="card-text" th:text="${item.supplier.name}">Supplier</p>
          </div>
        </div>
      </div>

      <div
        style="
          margin: 1rem 0 2rem 0;
          display: flex;
          justify-content: space-between;
        "
      >
        <a href="/admin/products" class="btn btn-primary mt-3">Back</a>
        <div style="display: flex; align-items: flex-end">
          <button
            class="btn btn-warning mt-3"
            data-bs-toggle="modal"
            data-bs-target="#editModal"
          >
            Edit
          </button>
          <button
            class="btn btn-danger mt-3"
            data-bs-toggle="modal"
            data-bs-target="#deleteModal"
            style="margin-left: 1rem"
          >
            Delete
          </button>
        </div>
      </div>

      <div
        class="modal fade"
        id="editModal"
        tabindex="-1"
        aria-labelledby="editModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="editModalLabel">Edit Product</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form
                th:action="@{/admin/products/{id}(id=${item.id})}"
                method="POST"
                enctype="multipart/form-data"
                onsubmit="handleEditSubmit(event, this);"
              >
                <div class="mb-3">
                  <label for="itemName" class="form-label">Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="itemName"
                    name="name"
                    th:value="${item.name}"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="itemDescription" class="form-label">Description</label>
                  <textarea
                    class="form-control"
                    id="itemDescription"
                    name="description"
                    th:text="${item.description}"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label for="itemPrice" class="form-label">Price</label>
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    class="form-control"
                    id="itemPrice"
                    name="price"
                    th:value="${item.price}"
                    required
                  />
                </div>
                <div class="mb-5">
                  <label for="itemDepartment" class="form-label">
                    Product category
                    <i>/ Note: currently only 1 and 2 are in use</i>
                  </label>
                  <select
                    class="form-select"
                    id="itemDepartment"
                    name="categoryId"
                  >
                    <option value="" disabled selected>
                      Select category
                    </option>
                    <option
                      th:each="category : ${categories}"
                      th:value="${category.id}"
                      th:text="${category.id + '. ' + category.name}"
                      th:selected="${category.id == item.category.id}"
                    ></option>
                  </select>
                </div>
                <div class="mb-3">
                  <label for="itemManufacturer" class="form-label"
                    >Manufacturer</label
                  >
                  <select
                    class="form-select"
                    id="itemManufacturer"
                    name="manufacturer.id"
                  >
                    <option
                      th:each="manufacturer : ${manufacturers}"
                      th:value="@{${manufacturer.id}}"
                      th:selected="@{${manufacturer.id == item.manufacturer.id}}"
                      th:text="@{${manufacturer.name}}"
                    ></option>
                  </select>
                </div>
                <div class="mb-5">
                  <label for="itemSupplier" class="form-label"
                    >Supplier</label
                  >
                  <select
                    class="form-select"
                    id="itemSupplier"
                    name="supplier.id"
                  >
                    <option
                      th:each="supplier : ${suppliers}"
                      th:value="@{${supplier.id}}"
                      th:selected="@{${supplier.id == item.supplier.id}}"
                      th:text="@{${supplier.name}}"
                    ></option>
                  </select>
                </div>
                <div class="mb-5">
                  <label class="form-label" for="itemImage">Upload image <i>(recommended size: 400px x 400px)</i></label>
                  <input
                    type="file"
                    class="form-control"
                    id="itemImage"
                    name="image"
                    accept=".png"
                  />
                </div>
                <button type="submit" class="btn btn-primary">
                  Save changes
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div
        class="modal fade"
        id="deleteModal"
        tabindex="-1"
        aria-labelledby="deleteModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="deleteModalLabel">
                Confirm deletion
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              Are you sure you want to delete product
              <strong th:text="${item.name}"></strong>?
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <form
                th:action="@{/admin/products/{id}/delete(id=${item.id})}"
                method="post"
                style="display: inline"
                onsubmit="return handleDeleteSubmit(this);"
              >
                <input type="hidden" name="_method" value="DELETE" />
                <input
                  type="hidden"
                  name="${_csrf.parameterName}"
                  value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-danger">Delete</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script>
      function handleEditSubmit(event, form) {
        event.preventDefault();
        fetch(form.action, {
          method: "POST",
          body: new FormData(form),
        })
          .then((response) => {
            if (response.ok) {
              const modal = bootstrap.Modal.getInstance(
                document.getElementById("editModal")
              );
              modal.hide();
              window.location.reload();
            } else {
              alert("Editing failed.");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("An error occurred while editing.");
          });
      }
    </script>

    <script>
      function handleDeleteSubmit(form) {
        event.preventDefault();
        fetch(form.action, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: new URLSearchParams(new FormData(form)),
        })
          .then((response) => {
            if (response.ok) {
              const modal = bootstrap.Modal.getInstance(
                document.getElementById("deleteModal")
              );
              modal.hide();
              window.location.href = "/admin/products";
            } else {
              alert("Deletion failed.");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("An error occurred while deleting.");
          });
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
