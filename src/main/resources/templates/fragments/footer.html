<footer th:fragment="footer" class="footer p-3" style="background-color: #333b3c; border-top: 1px solid #000000; color: #FFF">
  <div class="container text-center">
    <p style="margin: 0;">
      &copy; <span id="currentYear"></span> CoffeeShop. All rights reserved.
    </p>
  </div>
  <script defer>
  (function() {
    var el = document.getElementById('currentYear');
    if (el) {
      el.innerText = new Date().getFullYear();
    }
  })();
</script>
</footer>
