<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Products - <span th:text="${item.name}">Product</span></title>
    <style>
      @media screen and (max-width: 786px) {
        .back-button {
          padding: 0 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="container mt-5" style="min-height: calc(100vh - 158px); padding: 3rem 0.5rem">
      <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
      </div>
      <div
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 2rem;
        "
      >
        <div>
          <a
            th:if="${previousItem != null}"
            th:href="@{/products/{category}/{id}(category=${item.category.name}, id=${previousItem})}"
            >Previous</a
          >
        </div>
        <div>
          <a
            th:if="${nextItem != null}"
            th:href="@{/products/{category}/{id}(category=${item.category.name}, id=${nextItem})}"
            >Next</a
          >
        </div>
      </div>
      <h1 th:text="${item.name}">Product</h1>
      <div
        class="row row-cols-1 row-cols-md-2 g-4"
        style="margin-top: 3rem; padding: 0 0.5rem"
      >
        <div class="card h-100" style="max-width: 400px">
          <img
            th:if="${item.image != null}"
            th:src="@{/products/{category}/{id}/image(category=${item.category.name}, id=${item.image.id})}"
            class="card-img-top"
            alt="Product image"
          />
          <img
            th:unless="${item.image != null}"
            th:src="@{/images/No_Image_Available.png}"
            class="card-img-top"
            alt="No product image"
          />
        </div>
        <div class="col">
          <div class="card-body d-flex flex-column" style="height: 100%">
            <h3 class="card-text">
              <span th:if="${!#authorization.expression('hasRole(''VIP'')')}">
                <strong th:text="${item.price} + ' €'">Price</strong>
              </span>
              <span th:if="${#authorization.expression('hasRole(''VIP'')')}">
                <strong
                  style="text-decoration: line-through"
                  th:text="${item.price} + ' €'"
                  >Price</strong
                >
                <span
                  th:text="${discountedPrice} + ' €'"
                  style="color: red; font-weight: bold"
                  >Discounted price</span
                >
              </span>
            </h3>
            <p class="card-text" th:text="${item.description}">Description</p>
            <p>
              <strong class="card-text" th:text="${item.manufacturer.name}"
                >Manufacturer</strong
              >
            </p>
            <div style="display: flex; align-items: end; height: 100%">
              <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="productId" th:value="${item.id}" />
                <input
                  type="hidden"
                  name="redirectTo"
                  th:value="/products/coffee-machines"
                />
                <button type="submit" class="btn btn-warning mt-4">
                  Add to cart
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div
        class="back-button"
        style="margin-top: 1rem; display: flex; justify-content: space-between"
      >
        <a href="/products/coffee-machines" class="btn btn-primary mt-3"
          >Back</a
        >
      </div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
