<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .card {
        overflow: hidden;
      }
      .card-img-top {
        width: 100%;
        height: 350px;
        max-width: 450px;
        object-fit: cover;
        transform: scale(1) translateY(0);
        transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .card-img-top:hover {
        transform: scale(1.08) translateY(-3px);
      }

      .cart-image {
        transform: scale(1) translateY(0);
        transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .cart-image:hover {
        transform: scale(1.05) translateY(-1px);
      }
      .cart-image:active {
        transform: scale(0.9);
        transition: transform 10ms ease-in;
      }
    </style>
  </head>
  <body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="container" style="min-height: calc(100vh - 158px); padding: 3rem 0.5rem;">
      <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
      </div>
      <div class="row align-items-center">
        <div class="col-md-6 col-12 text-md-left align-middle">
          <div th:if="${itemsWithImageUrls.size() > 0}">
            <h1 th:text="${itemsWithImageUrls[0].item.category.name}">
              Product Category
            </h1>
          </div>
          <div th:if="${itemsWithImageUrls.size() == 0}">
            <h1>No products found</h1>
          </div>
        </div>
        <div class="col-md-6 col-12">
          <form
            th:action="@{/products/{category}(category=${itemsWithImageUrls.size() > 0 ? itemsWithImageUrls[0].item.category.name : ''})}"
            method="get"
            class="input-group"
          >
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="Search products..."
              aria-label="Search products"
            />
            <button class="btn btn-primary" type="submit">Search</button>
          </form>
        </div>
      </div>

      <div
        class="row row-cols-1 row-cols-md-3 g-4"
        style="margin-top: 3rem"
        th:if="${itemsWithImageUrls.size() > 0}"
      >
        <div class="col" th:each="itemWithImageUrl : ${itemsWithImageUrls}">
          <div class="card h-100">
            <a
              th:href="@{/products/{category}/{id}(category=${itemWithImageUrl.item.category.name}, id=${itemWithImageUrl.item.id})}"
            >
              <img
                th:if="${itemWithImageUrl.imageUrl != null}"
                th:src="@{${itemWithImageUrl.imageUrl}}"
                class="card-img-top"
                alt="Product image"
              />
            </a>
            <div class="card-body">
              <h5 class="card-title" th:text="${itemWithImageUrl.item.name}">
                Product name
              </h5>
              <p
                class="card-text"
                th:if="${!#authorization.expression('hasRole(''VIP'')')}"
              >
                <strong th:text="${itemWithImageUrl.item.price} + ' €'"
                  >Price</strong
                >
              </p>
              <p
                class="card-text"
                th:if="${#authorization.expression('hasRole(''VIP'')')}"
              >
                <strong
                  style="text-decoration: line-through"
                  th:text="${itemWithImageUrl.item.price} + ' €'"
                  >Price</strong
                >
                <span
                  th:text="${itemWithImageUrl.discountedPrice} + ' €'"
                  style="color: red; font-weight: bold"
                  >Discounted price</span
                >
              </p>

              <div
                style="
                  position: absolute;
                  bottom: 0;
                  right: 0;
                  width: 15%;
                  background-color: rgb(255, 94, 94);
                  aspect-ratio: 1;
                  border-radius: 50%;
                "
              >
                <form th:action="@{/cart/add}" method="post">
                  <input
                    type="hidden"
                    name="productId"
                    th:value="${itemWithImageUrl.item.id}"
                  />
                  <input
                    type="hidden"
                    name="redirectTo"
                    th:value="${currentPageUrl}"
                  />
                  <button
                    type="submit"
                    style="
                      border: none;
                      background: none;
                      padding: 0;
                      cursor: pointer;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                    "
                  >
                    <img
                      class="cart-image"
                      th:src="@{/images/add-to-cart.png}"
                      style="width: 80%; text-align: center; scale: 1"
                    />
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="container mt-5 p-0">
        <ul class="pagination">
          <li
            class="page-item"
            th:classappend="${page.isFirst()} ? 'disabled' : ''"
          >
            <a
              class="page-link"
              th:href="@{/products/{category}(category=${itemsWithImageUrls.size() > 0 ? itemsWithImageUrls[0].item.category.name : ''}, page=${page.number - 1})}"
              aria-label="Previous"
            >
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>

          <li
            class="page-item"
            th:each="item : ${pageNumbers}"
            th:classappend="${item == page.number} ? 'active' : ''"
          >
            <a
              class="page-link"
              th:href="@{/products/{category}(category=${itemsWithImageUrls.size() > 0 ? itemsWithImageUrls[0].item.category.name : ''}, page=${item})}"
              th:text="${item + 1}"
              >1</a
            >
          </li>

          <li
            class="page-item"
            th:classappend="${page.isLast()} ? 'disabled' : ''"
          >
            <a
              class="page-link"
              th:href="@{/products/{category}(category=${itemsWithImageUrls.size() > 0 ? itemsWithImageUrls[0].item.category.name : ''}, page=${page.number + 1})}"
              aria-label="Next"
            >
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>
        </ul>
      </div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
